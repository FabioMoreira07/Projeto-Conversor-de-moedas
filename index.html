<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <script src="scripts.js" defer></script>

    <title>Convert Money</title>
</head>

<body>
    <img class="logo" src="assets/logo.gif" alt="logo-convert-Money">

    <main>
        <label>
            converter <b>de</b>
            <select>
                <option>R$ Real Brasileiro</option>
            </select>

        </label>

        <label>
            para
            <select class="currency-select">
                <option value="Dola">US$ Dólar Americano</option>
                <option value="Euro">€ Euro</option>
                <option value="Libra">£ Libra Esterlina</option>
                <option value="Bitcoin">₿ Bitcoin</option>
            </select>
        </label>

        <label>
            valor
            <input class="input-currency" placeholder="Digite o valor">
        </label>

        <button class="convert-button">Converter</button>

        <section>
            <div class="currency-box">
                <img src="assets/real.png" alt="logo-a-converter">
                <p class="currency"> Real Brasileiro </p>
                <p class="currency-value-to-convert"> R$ 0,00 </p>
            </div>

            <img class="arrow-img" src="assets/seta.png" alt="seta-conversao">

            <div class="currency-box">
                <img class="currency-img" src="assets/dolar.png" alt="logo-moeda-convertida">
                <p class="currency" id="currecy-name"> Dólar Americano </p>
                <p class="currency-value"> U$ 0,00 </p>
            </div>

        </section>
    </main>
</body>

</html>
